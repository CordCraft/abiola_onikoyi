# Netlify configuration for the Next.js 16 app.
# The Next.js runtime plugin handles SSR, Server Actions, the proxy
# (middleware), and image optimization automatically.

[build]
  command = "npm run build"

[build.environment]
  # Next.js 16 requires Node 20.9+; pin a modern LTS for reproducible builds.
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"
